<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mock Google Maps</title>
</head>
<body>
    <div role="feed">
        <!-- Negocio Estándar -->
        <div>
            <div role="article" aria-label="Abarrotes Lulú">
                <span aria-label="4.6 stars">4.6 stars</span>
                <span aria-label="11 reviews">11 reviews</span>
            </div>
        </div>
        <!-- Negocio con Comillas (EL BUG) -->
        <div>
            <div role="article" aria-label="Abarrotes 'Toluca'">
                <span aria-label="4.2 stars">4.2 stars</span>
                <span aria-label="5 reviews">5 reviews</span>
            </div>
        </div>
        <!-- Otro Negocio con Comillas Dobles (EL BUG) -->
        <div>
            <div role="article" aria-label='Abarrotes "La Barata"'>
                <span aria-label="4.4 stars">4.4 stars</span>
                <span aria-label="8 reviews">8 reviews</span>
            </div>
        </div>
        <!-- Negocio Cerrado -->
        <div>
            <div role="article" aria-label="Tienda Cerrada">
                <span>Permanently closed</span>
            </div>
        </div>
    </div>

    <!-- Panel de Detalles (Simulado) -->
    <div id="details">
        <button data-item-id="address" aria-label="Dirección: Calle Falsa 123">Calle Falsa 123</button>
        <button data-item-id="phone:0" aria-label="Teléfono: 7221234567">7221234567</button>
        <a data-item-id="authority" href="http://lulushop.com">Website</a>
    </div>
</body>
</html>
